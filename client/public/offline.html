<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aries Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(80% 70% at 50% 0%, #1a2852, transparent), #050710;
        color: #edf4ff;
      }
      article {
        width: min(520px, calc(100vw - 24px));
        border: 1px solid rgba(166, 201, 255, 0.32);
        border-radius: 16px;
        background: rgba(17, 30, 55, 0.6);
        backdrop-filter: blur(12px);
        padding: 18px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.2rem;
      }
      p {
        margin: 0;
        color: #bdd1ef;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <article>
      <h1>Aries is currently offline</h1>
      <p>Your connection dropped. Reconnect to continue using chat and live features.</p>
    </article>
  </body>
</html>
